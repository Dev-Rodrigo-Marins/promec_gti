  # HTTP (para futuras integrações)
  http: ^1.1.0
  
  # Storage Local
  shared_preferences: ^2.2.2
  
  # Notificações
  fluttertoast: ^9.0.0

dev_dependencies:
  url_launcher: ^6.2.0
  flutter_map: ^5.0.0
  latlong2: ^0.9.0
  #geolocator: ^9.0.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
